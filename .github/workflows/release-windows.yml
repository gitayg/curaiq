name: release-windows

# Builds the MoorAI Windows agent (NSIS installer) on a native windows-latest runner — the reliable
# path, since the app depends on C crates (ring/TLS) that don't cross-compile from macOS. The macOS
# DMG is built + notarized separately via `npm run release` on a Mac.
#
# Push a version tag (v0.12.1) to build and publish a GitHub Release with the installer attached.
# Or run manually (workflow_dispatch) to just produce a downloadable build artifact.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# tauri-action creates a GitHub Release on tag builds — needs write access to repo contents.
permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer (+ publish release on tag)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing — must match the pubkey in src-tauri/tauri.conf.json so the in-app
          # auto-updater accepts the build. Add both as repo secrets.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # Only create a Release for tag builds; manual runs just build (artifact uploaded below).
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: "MoorAI ${{ github.ref_name }} (Windows)"
          releaseBody: "Windows installer for the MoorAI agent. Download the `-setup.exe` below."
          releaseDraft: false
          prerelease: false
          args: --bundles nsis

      - name: Upload installer as a build artifact
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: moorai-windows-setup
          path: |
            src-tauri/target/release/bundle/nsis/*-setup.exe
            src-tauri/target/release/bundle/nsis/*-setup.exe.sig
          if-no-files-found: warn
